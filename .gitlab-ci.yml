stages:
  - build
  - deploy

build:
  stage: build
  script:
    - curl -fsSL https://deb.nodesource.com/setup_18.x | bash -
    - apt-get install -y nodejs
    - cd ianuarius-app/frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - ianuarius-app/frontend/dist

deploy:
  stage: deploy
  script:
    - apk add --no-cache lftp
    - |
      cat > ianuarius-app/backend/.env << EOF
      DB_HOST=$DB_HOST
      DB_NAME=$DB_NAME
      DB_USER=$DB_USER
      DB_PASS=$DB_PASS
      DB_PORT=$DB_PORT
      EOF
    - lftp -u $FTP_USER,$FTP_PASS ftps://handmadegames.org -e "
        set ssl:verify-certificate no;
        mirror -R ianuarius-app/frontend/dist/ /;
        mirror -R ianuarius-app/backend/ /api;
        bye"
  only:
    - main