stages:
  - build
  - deploy

build:
  stage: build
  image: node:18
  script:
    - cd ianuarius-app/frontend
    - npm install
    - npm run build
  artifacts:
    paths:
      - frontend/dist


deploy:
  stage: deploy
  image: alpine:latest
  script:
    - apk add --no-cache lftp
    - lftp -u $FTP_USER,$FTP_PASS ftps://handmadegames.org -e "
        set ssl:verify-certificate no;
        mirror -R frontend/dist/ /;
        mirror -R backend/ /backend;
        bye"
  only:
    - main