# archivo de composicion docker

services:
    # servicio web apache php
    web:
        build: .
        container_name: ianuarius_web
        ports:
            - "8081:80"
        volumes:
            - ./backend:/var/www/html
        depends_on:
            - db

    # servicio base datos
    db:
        image: mysql:8.0
        container_name: ianuarius_db
        ports:
            - "3307:3306"
        environment:
            MYSQL_ROOT_PASSWORD: root
            MYSQL_DATABASE: ianuarius_db
        volumes:
            - db_data:/var/lib/mysql

    phpmyadmin:
        image: phpmyadmin/phpmyadmin
        container_name: ianuarius_pma
        ports:
            - "8082:80"
        environment:
            PMA_HOST: db
            MYSQL_ROOT_PASSWORD: root
        depends_on:
            - db

volumes:
    # volumen persistencia mysql
    db_data: