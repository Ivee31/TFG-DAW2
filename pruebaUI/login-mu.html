<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ianuarius - Iniciar Sesión</title>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ianuarius: '#FE0000',
                        oscuro: '#171717',
                        gris: '#262626'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        collegiate: ['Graduate', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .titulo-collegiate {
            font-family: 'Graduate', sans-serif;
            color: transparent;
            -webkit-text-stroke: 1px #FFFFFF;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FE0000; }
    </style>
</head>
<body class="bg-oscuro font-sans antialiased text-gray-200 min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo / título -->
    <div class="mb-8 text-center">
        <h1 class="titulo-collegiate text-4xl md:text-5xl tracking-widest mb-2">IANUARIUS</h1>
        <p class="text-ianuarius text-xs tracking-[0.5em] uppercase font-bold">A T L E T I S M O</p>
    </div>

    <!-- Card de login -->
    <div class="w-full max-w-sm bg-gris rounded-2xl border-t-4 border-ianuarius shadow-2xl p-8">
        <h2 class="text-xl font-extrabold tracking-tight mb-1">Iniciar sesión</h2>
        <p class="text-gray-500 text-xs uppercase tracking-widest mb-8">Accede a tu cuenta</p>

        <form class="space-y-5">
            <!-- Email -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Correo electrónico</label>
                <input type="email" placeholder="atleta@ianuarius.es"
                    class="w-full bg-oscuro border border-white/10 p-3 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:border-ianuarius outline-none transition">
            </div>

            <!-- Contraseña -->
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Contraseña</label>
                <input type="password" placeholder="••••••••"
                    class="w-full bg-oscuro border border-white/10 p-3 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:border-ianuarius outline-none transition">
            </div>

            <!-- Botón principal -->
            <button type="submit"
                class="w-full bg-ianuarius text-white font-black py-3 rounded-xl text-xs uppercase tracking-[0.3em] hover:bg-red-700 transition duration-300 shadow-[0_5px_20px_rgba(254,0,0,0.3)] hover:shadow-[0_5px_25px_rgba(254,0,0,0.5)] mt-2">
                Iniciar sesión
            </button>
        </form>

        <!-- Divisor -->
        <div class="flex items-center gap-3 my-6">
            <div class="flex-1 h-px bg-white/10"></div>
            <span class="text-gray-600 text-[10px] uppercase tracking-widest">o continúa con</span>
            <div class="flex-1 h-px bg-white/10"></div>
        </div>

        <!-- Google OAuth -->
        <button class="w-full bg-oscuro border border-white/10 text-gray-300 font-semibold py-3 rounded-xl text-xs uppercase tracking-widest hover:border-white/30 hover:text-white transition duration-300 flex items-center justify-center gap-3">
            <svg class="w-4 h-4" viewBox="0 0 24 24" fill="none">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continuar con Google
        </button>

        <!-- Links inferiores -->
        <div class="mt-6 flex flex-col items-center gap-3 text-xs">
            <a href="#" class="text-gray-500 hover:text-ianuarius transition">¿Olvidaste tu contraseña?</a>
            <p class="text-gray-600">¿No tienes cuenta? <a href="#" class="text-ianuarius hover:text-red-400 font-bold transition">Crear cuenta</a></p>
        </div>
    </div>

    <!-- Footer mínimo -->
    <p class="mt-8 text-[10px] text-gray-700 uppercase tracking-widest">Ianuarius Athletics Club &copy; 2026</p>

</body>
</html>
