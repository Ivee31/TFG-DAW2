<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wireframe – Registro</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg:          #f5f5f0;
            --surface:     #ffffff;
            --stroke:      #c8c8c0;
            --stroke2:     #a0a098;
            --label:       #888880;
            --text:        #2a2a28;
            --placeholder: #d0d0c8;
            --accent:      #2a2a28;
            --r:           6px;
        }

        body {
            background: var(--bg);
            font-family: 'Courier New', monospace;
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            padding: 32px 16px;
        }

        .logo-block {
            text-align: center;
            margin-bottom: 24px;
        }
        .logo-title {
            font-size: 28px;
            letter-spacing: 0.15em;
            color: var(--stroke2);
            border: 2px solid var(--stroke2);
            padding: 4px 12px;
            display: inline-block;
            margin-bottom: 6px;
        }
        .logo-sub {
            font-size: 9px;
            letter-spacing: 0.5em;
            text-transform: uppercase;
            color: var(--label);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--stroke);
            border-top: 4px solid var(--accent);
            border-radius: var(--r);
            padding: 28px 24px;
            width: 100%;
            max-width: 480px;
        }

        .card-titulo {
            font-size: 18px;
            font-weight: 400;
            color: var(--text);
            margin-bottom: 4px;
        }
        .card-sub {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--label);
            margin-bottom: 24px;
        }

        .field-label {
            font-size: 9px;
            letter-spacing: 0.2em;
            text-transform: uppercase;
            color: var(--label);
            display: block;
            margin-bottom: 5px;
        }
        .inp {
            width: 100%;
            border: 1px solid var(--stroke);
            border-radius: var(--r);
            padding: 9px 12px;
            font-family: 'Courier New', monospace;
            font-size: 11px;
            color: var(--label);
            background: var(--bg);
            margin-bottom: 14px;
        }
        select.inp { appearance: none; cursor: default; }

        .row-2 {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px;
        }

        .btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 100%;
            border: 1px solid var(--stroke2);
            border-radius: var(--r);
            padding: 10px 16px;
            font-family: 'Courier New', monospace;
            font-size: 10px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--label);
            background: var(--surface);
            cursor: default;
            margin-bottom: 10px;
        }
        .btn.fill {
            background: var(--accent);
            border-color: var(--accent);
            color: var(--bg);
            margin-top: 6px;
        }

        .divider {
            display: flex;
            align-items: center;
            gap: 10px;
            margin: 14px 0;
        }
        .divider hr { flex: 1; border: none; border-top: 1px solid var(--stroke); }
        .divider span {
            font-size: 9px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--label);
            white-space: nowrap;
        }

        .link-row {
            margin-top: 14px;
            text-align: center;
            font-size: 10px;
            color: var(--label);
        }
        .link-row .lnk { text-decoration: underline; color: var(--text); cursor: default; }

        .oauth-icon {
            width: 14px; height: 14px;
            background: var(--placeholder);
            border-radius: 50%;
            display: inline-block;
            margin-right: 8px;
            vertical-align: middle;
        }

        .wf-nota {
            font-size: 9px;
            color: var(--label);
            letter-spacing: 0.12em;
            text-transform: uppercase;
            border-left: 2px solid var(--stroke);
            padding-left: 6px;
            margin-top: 14px;
        }
        .footer-wf {
            margin-top: 18px;
            font-size: 9px;
            letter-spacing: 0.15em;
            text-transform: uppercase;
            color: var(--label);
        }
    </style>
</head>
<body>

    <div class="logo-block">
        <div class="logo-title">IANUARIUS</div>
        <div class="logo-sub">A T L E T I S M O</div>
    </div>

    <div class="card">
        <div class="card-titulo">Crear cuenta</div>
        <div class="card-sub">Únete al club Ianuarius</div>

        <!-- Nombre + Apellidos -->
        <div class="row-2">
            <div>
                <label class="field-label">Nombre</label>
                <input class="inp" type="text" placeholder="Juan" readonly>
            </div>
            <div>
                <label class="field-label">Apellidos</label>
                <input class="inp" type="text" placeholder="García López" readonly>
            </div>
        </div>

        <!-- DNI -->
        <label class="field-label">DNI</label>
        <input class="inp" type="text" placeholder="12345678A" readonly>

        <!-- Email -->
        <label class="field-label">Correo electrónico</label>
        <input class="inp" type="text" placeholder="atleta@ianuarius.es" readonly>

        <!-- Fecha nacimiento -->
        <label class="field-label">Fecha de nacimiento</label>
        <input class="inp" type="text" placeholder="DD/MM/AAAA" readonly>

        <!-- Género + Rol -->
        <div class="row-2">
            <div>
                <label class="field-label">Género</label>
                <select class="inp"><option>Masculino / Femenino / No esp.</option></select>
            </div>
            <div>
                <label class="field-label">Rol</label>
                <select class="inp"><option>Atleta / Entrenador</option></select>
            </div>
        </div>

        <!-- Contraseña -->
        <label class="field-label">Contraseña</label>
        <input class="inp" type="text" placeholder="••••••••" readonly>

        <!-- Confirmar contraseña -->
        <label class="field-label">Confirmar contraseña</label>
        <input class="inp" type="text" placeholder="••••••••" readonly>

        <!-- Submit -->
        <button class="btn fill">Crear cuenta</button>

        <!-- Divisor -->
        <div class="divider">
            <hr><span>o regístrate con</span><hr>
        </div>

        <!-- Google OAuth -->
        <button class="btn">
            <span class="oauth-icon"></span>
            Registrarse con Google
        </button>

        <!-- Link inferior -->
        <div class="link-row">¿Ya tienes cuenta? <span class="lnk">Iniciar sesión →</span></div>

        <div class="wf-nota">campos: nombre · apellidos · dni · email · fecha_nac · género (select) · rol (select) · password · confirm · oauth · submit</div>
    </div>

    <p class="footer-wf">Ianuarius Athletics Club © 2026</p>

</body>
</html>
