<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ianuarius - Recuperar Contraseña</title>
    <link href="https://fonts.googleapis.com/css2?family=Graduate&family=Inter:wght@300;400;600;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        ianuarius: '#FE0000',
                        oscuro: '#171717',
                        gris: '#262626'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                        collegiate: ['Graduate', 'sans-serif']
                    }
                }
            }
        }
    </script>
    <style>
        .titulo-collegiate {
            font-family: 'Graduate', sans-serif;
            color: transparent;
            -webkit-text-stroke: 1px #FFFFFF;
        }
        ::-webkit-scrollbar { width: 8px; }
        ::-webkit-scrollbar-track { background: #171717; }
        ::-webkit-scrollbar-thumb { background: #262626; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #FE0000; }
    </style>
</head>
<body class="bg-oscuro font-sans antialiased text-gray-200 min-h-screen flex flex-col items-center justify-center px-4">

    <!-- Logo / título -->
    <div class="mb-8 text-center">
        <h1 class="titulo-collegiate text-4xl md:text-5xl tracking-widest mb-2">IANUARIUS</h1>
        <p class="text-ianuarius text-xs tracking-[0.5em] uppercase font-bold">A T L E T I S M O</p>
    </div>

    <!-- Card recuperar contraseña -->
    <div class="w-full max-w-sm bg-gris rounded-2xl border-t-4 border-ianuarius shadow-2xl p-8">

        <!-- Icono de candado -->
        <div class="w-12 h-12 bg-ianuarius/10 rounded-full flex items-center justify-center mb-5 mx-auto">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-6 h-6 text-ianuarius" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M16.5 10.5V6.75a4.5 4.5 0 1 0-9 0v3.75m-.75 11.25h10.5a2.25 2.25 0 0 0 2.25-2.25v-6.75a2.25 2.25 0 0 0-2.25-2.25H6.75a2.25 2.25 0 0 0-2.25 2.25v6.75a2.25 2.25 0 0 0 2.25 2.25z" />
            </svg>
        </div>

        <h2 class="text-xl font-extrabold tracking-tight mb-1 text-center">¿Olvidaste tu contraseña?</h2>
        <p class="text-gray-500 text-xs text-center leading-relaxed mb-8">
            Introduce tu correo y te enviaremos un enlace para restablecer tu contraseña.
        </p>

        <form class="space-y-5">
            <div>
                <label class="block text-[10px] font-black uppercase tracking-[0.2em] text-gray-400 mb-2">Correo electrónico</label>
                <input type="email" placeholder="atleta@ianuarius.es"
                    class="w-full bg-oscuro border border-white/10 p-3 rounded-lg text-sm text-gray-200 placeholder-gray-600 focus:border-ianuarius outline-none transition">
            </div>

            <button type="submit"
                class="w-full bg-ianuarius text-white font-black py-3 rounded-xl text-xs uppercase tracking-[0.3em] hover:bg-red-700 transition duration-300 shadow-[0_5px_20px_rgba(254,0,0,0.3)]">
                Enviar enlace
            </button>
        </form>

        <!-- Aviso spam -->
        <div class="mt-5 p-3 bg-oscuro/60 rounded-lg border border-white/5 flex gap-3 items-start">
            <svg xmlns="http://www.w3.org/2000/svg" class="w-4 h-4 text-yellow-500 flex-shrink-0 mt-0.5" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126zM12 15.75h.007v.008H12v-.008z" />
            </svg>
            <p class="text-gray-500 text-[10px] leading-relaxed">
                Si no recibes el correo en unos minutos, <span class="text-gray-400">revisa la carpeta de spam</span> o correo no deseado.
            </p>
        </div>

        <!-- Volver al login -->
        <div class="mt-6 text-center">
            <a href="#" class="text-gray-500 hover:text-white text-xs transition flex items-center justify-center gap-1">
                <span>&larr;</span> Volver al inicio de sesión
            </a>
        </div>
    </div>

    <p class="mt-8 text-[10px] text-gray-700 uppercase tracking-widest">Ianuarius Athletics Club &copy; 2026</p>

</body>
</html>
